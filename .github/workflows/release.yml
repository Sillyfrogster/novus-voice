name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 24.04 floor: ort's prebuilt onnxruntime needs glibc >= 2.38 (__isoc23_* symbols), so 22.04 (glibc 2.35) fails to link
          - platform: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          # No Intel Mac target: ort ships no prebuilt onnxruntime for x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libclang-dev

      - name: Point bindgen at the runner's LLVM (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: echo 'LIBCLANG_PATH=C:\Program Files\LLVM\bin' >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and checksum
        shell: bash
        run: |
          cargo build --release --target "${{ matrix.target }}"
          EXT=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then EXT=".exe"; fi
          ASSET="novus-voice-${{ matrix.target }}$EXT"
          cp "target/${{ matrix.target }}/release/novus-voice$EXT" "$ASSET"
          if command -v sha256sum >/dev/null; then
            sha256sum "$ASSET" > "$ASSET.sha256"
          else
            shasum -a 256 "$ASSET" > "$ASSET.sha256"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            novus-voice-${{ matrix.target }}*
